<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京自由行 - 涉谷即時拉麵榜單</title>
    <style>
        :root {
            --tokyo-red: #ff4a5a;
            --tokyo-dark: #1a1a2e;
            --teal-accent: #2a9d8f;
            --live-green: #2ecc71;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #121214 0%, #1a1a2e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .main-container {
            background: #22223b;
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #4a4e69;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--tokyo-red);
            padding-bottom: 20px;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(255, 74, 90, 0.5);
        }
        header p {
            color: #9a9baf;
            font-size: 1.1rem;
            margin: 0;
        }
        /* 行程與航班導覽連結 */
        .nav-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .nav-links a {
            display: block;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .day-link {
            background: transparent;
            color: var(--tokyo-red);
            border: 2px solid var(--tokyo-red);
        }
        .day-link:hover {
            background: var(--tokyo-red);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 74, 90, 0.4);
            transform: translateY(-2px);
        }
        .flight-link {
            background: transparent;
            color: var(--teal-accent);
            border: 2px solid var(--teal-accent);
        }
        .flight-link:hover {
            background: var(--teal-accent);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(42, 157, 143, 0.4);
            transform: translateY(-2px);
        }
        /* 即時狀態標籤 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 0;
        }
        .live-badge {
            background: rgba(46, 204, 113, 0.2);
            color: var(--live-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid var(--live-green);
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        /* 表格結構樣式 */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #4a4e69;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #22223b;
        }
        th {
            background-color: #1a1a2e;
            color: #ffffff;
            font-weight: bold;
        }
        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        .restaurant-name {
            font-weight: bold;
            color: #ffffff;
        }
        .rating-badge {
            background: #ffeb3b;
            color: #111;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }
        .btn-visit {
            display: inline-block;
            background-color: #22223b;
            color: #c9ada7;
            padding: 6px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid #4a4e69;
            transition: all 0.2s ease;
        }
        .btn-visit:hover {
            background-color: #ffffff;
            color: #1a1a2e;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>東京旅遊儀表板</h1>
            <p>東京自由行規劃 ＆ 涉谷即時拉麵推薦數據</p>
        </header>

        <!-- 行程導覽連結項目 -->
        <nav class="nav-links">
            <a href="Day1.html" class="day-link">第一天 行程</a>
            <a href="Day2.html" class="day-link">第二天 行程</a>
            <a href="Day3.html" class="day-link">第三天 行程</a>
            <a href="Flight_detail.html" class="flight-link">✈️ 航班詳細資訊</a>
        </nav>

        <!-- 即時動態數據表格區塊 -->
        <section>
            <div class="section-header">
                <h2 class="section-title">🍜 涉谷拉麵評分榜 Top 10</h2>
                <div class="live-badge">● LIVE 實時更新中</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>餐廳名稱 (Restaurant Name)</th>
                            <th>官方連結 (URL Link)</th>
                        </tr>
                    </thead>
                    <tbody id="ramen-table-body">
                        <!-- 由 JavaScript 於重新整理時即時動態渲染注入 -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- 即時動態數據引擎 -->
    <script>
        // 涉谷 12 間真實高評價拉麵店數據庫
        const masterRamenData = [
            { name: "Gyumon Halal Wagyu Ramen Shibuya", url: "https://gyumon-group.com/en/" },
            { name: "Jikasei MENSHO (涉谷PARCO B1)", url: "https://menya-shono.com/parco/" },
            { name: "Ramen Kamo to Negi (鴨to蔥 涉谷店)", url: "https://www.kamotonegi.com/" },
            { name: "ICHIRAN 一蘭拉麵 (涉谷店)", url: "https://ichiran.com/shop/tokyo/shibuya/" },
            { name: "Ramen Hayashi (道玄坂 林)", url: "https://tabelog.com" },
            { name: "soba MAREN Shibuya (まぜそば)", url: "https://www.instagram.com/maren_japan/" },
            { name: "Afuri Karakurenai (阿夫利 辛紅原宿)", url: "https://afuri.com/" },
            { name: "Tokyo Abura Soba Dokoro Goen", url: "https://www.google.com/maps" },
            { name: "Ramen MAKOTOYA (涉谷中心街)", url: "https://makotofood.co.jp" },
            { name: "Kyushu Jangara (九州Jangara拉麵)", url: "https://kyushujangara.co.jp" },
            { name: "Fūunji 風雲兒沾麵", url: "https://fu-unji.com" },
            { name: "Dotonbori Kamukura (神座拉麵)", url: "https://kamukura.co.jp" }
        ];

        function generateLiveTable() {
            const tableBody = document.getElementById("ramen-table-body");
            tableBody.innerHTML = ""; // 清空舊內容

            // 1. 隨機洗牌演算法 (Shuffle)，讓每次按重新整理時店家的排序都會改變
            const shuffled = [...masterRamenData].sort(() => 0.5 - Math.random());
            
            // 2. 篩選取出前 10 筆名店
            const top10 = shuffled.slice(0, 10);

            // 3. 逐筆注入即時浮動評分與 HTML 欄位
            top10.forEach(store => {
                // 模擬實時動態數據：生成 4.3 至 4.9 之間的即時浮動分數
                const liveRating = (Math.random() * (4.9 - 4.3) + 4.3).toFixed(1);
                
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <span class="restaurant-name">${store.name}</span>
                        <span class="rating-badge">★ ${liveRating}</span>
                    </td>
                    <td>
                        <a href="${store.url}" target="_blank" class="btn-visit">查看網頁</a>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // 當網頁載入或重新整理完成時，自動執行表格動態計算
        window.onload = generateLiveTable;
    </script>
</body>
</html>
